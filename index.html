<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>West Island June 20 Flood Map / Carte des Inondations</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        .legend {
            background: white; padding: 12px; line-height: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); border-radius: 8px; font-size: 13px;
        }
        .legend i { width: 14px; height: 14px; float: left; margin-right: 8px; opacity: 0.8; border-radius: 50%; margin-top: 3px; }
        .report-btn {
                    position: absolute; top: 20px; left: 60px; z-index: 1000; 
                    background: #d9534f; padding: 12px 20px; border-radius: 8px; 
                    font-weight: bold; text-decoration: none; color: white; 
                    border: 2px solid #d9534f; font-size: 15px; text-align: center; 
                    line-height: 1.4; transition: all 0.2s ease;
                    animation: pulse-glow 2s infinite;
                }
                .report-btn:hover { 
                    background: #c9302c; 
                    border-color: #c9302c; 
                    color: white; 
                    animation: none; /* Stops pulsing when hovered */
                    box-shadow: 0 6px 30px rgba(217, 83, 79, 0.6);
                    transform: translateY(-1px);
                }
        
                @keyframes pulse-glow {
                    0% {
                        box-shadow: 0 0 0 0 rgba(217, 83, 79, 0.7);
                    }
                    70% {
                        box-shadow: 0 0 0 15px rgba(217, 83, 79, 0);
                    }
                    100% {
                        box-shadow: 0 0 0 0 rgba(217, 83, 79, 0);
                    }
                }
        .report-btn:hover { background: #d9534f; color: white; }
    </style>
</head>
<body>

    <a href="https://docs.google.com/forms/d/e/1FAIpQLSeknXL4-K45ajNzb32mYb4nKLntBXpRv5abzQeLVaq258Mafg/viewform?usp=header" target="_blank" class="report-btn">
        ⚠️ Report Flooding (Street or Home)<br><span style="font-size: 11px; font-weight: normal; display:block; margin-top:2px;">Signaler une inondation (rue ou maison)</span>
    </a>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const DATA_FEED_URL = "https://script.google.com/macros/s/AKfycbxNfHFi5zd41IgTSy04JgUznhCbvtQVn9tHcH7ryLubzhFlfNfbUf0_-aujaqOkxhKgxw/exec";

        const INTERSECTION_TRIM_METERS = 200;
        const ADDRESS_TRIM_METERS = 80;
        const SEARCH_MARGIN_METERS = 60; // extra buffer so trimmed roads have real data past the cut point
        const ENDPOINT_TOLERANCE_METERS = 2; // how close two way-endpoints must be to count as "connected"
        const OVERPASS_ENDPOINTS = [
            "https://overpass-api.de/api/interpreter",
            "https://overpass.kumi.systems/api/interpreter",
            "https://overpass.private.coffee/api/interpreter"
        ];
        const OVERPASS_FETCH_TIMEOUT_MS = 8000;
        // corsproxy.io's free tier explicitly supports github.io as an
        // origin. We route Overpass requests through it because some
        // Overpass mirrors don't reliably send CORS headers for
        // arbitrary origins, even though they answer fine to non-browser
        // clients. This is a free third-party service with no uptime
        // guarantee - if it's ever down, requests simply fail and we
        // fall back to circles, same as any other Overpass failure.
        const CORS_PROXY_PREFIX = "https://corsproxy.io/?url=";

        const map = L.map('map').setView([45.4764, -73.8417], 12.5);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        function getMarkerColor(severity) {
            if (!severity) return '#5cb85c';
            const sev = severity.toLowerCase().trim();
            if (sev.includes('severe') || sev.includes('majeur')) return '#d9534f';
            if (sev.includes('mild') || sev.includes('modér') || sev.includes('medium') || sev.includes('moyen')) return '#f0ad4e';
            return '#5cb85c';
        }

        function buildPopup(report) {
            return `
                <div style="font-family: sans-serif; font-size: 13px; line-height: 18px;">
                    <strong style="font-size: 14px; color: #333;">${report.severity || ''}</strong><br>
                    <hr style="border: 0; border-top: 1px solid #eee; margin: 6px 0;">
                    <strong>Location / Emplacement:</strong> ${report.address}
                    ${report.details ? `<br><strong>Additional comments / Commentaires additionnels:</strong> ${report.details}` : ''}
                </div>
            `;
        }

        // =========================================================
        // ADDRESS CLASSIFICATION
        // Determines how a report should render, based on the
        // STRUCTURE of the address text rather than a list of known
        // place-name keywords (which can never cover every possible
        // school/store/landmark name a user might type).
        // =========================================================
        const STREET_TYPE_WORDS = /\b(rue|boul(?:evard)?|blvd|ave(?:nue)?|street|st|chemin|ch|place|pl|croissant|cr|montee|cote|terrasse|promenade|drive|dr|road|rd|court|ct|lane|ln|way|crescent)\b/i;
        const CA_POSTAL_FULL = /^[A-Za-z]\d[A-Za-z][\s-]?\d[A-Za-z]\d$/;
        const CA_POSTAL_FSA = /^[A-Za-z]\d[A-Za-z]$/;

        function splitIntersection(address) {
            return address.split(/\s*[\/&]\s*|\s+and\s+/i).map(s => s.trim()).filter(Boolean);
        }

        function looksLikeStreetReference(address) {
            const trimmed = address.trim();
            const hasHouseNumber = /^\d+/.test(trimmed);
            const hasIntersectionSeparator = splitIntersection(trimmed).length >= 2;

            // A street-type word only counts if it's the FIRST or LAST
            // word of the address - matching how real street names are
            // actually formed in Quebec/the West Island ("Rue Huron",
            // "Place Bellerive", "Parc Lake Road"). A street-type word
            // buried in the MIDDLE of a longer string is much more
            // likely to be an incidental mention near a business name
            // ("Esso Provi-soir boul gouin", "Jean Coutu St Jean H9H")
            // than the actual structure of a street reference.
            const words = trimmed.split(/\s+/);
            const hasStreetTypeWord = words.length > 0 &&
                (STREET_TYPE_WORDS.test(words[0]) || STREET_TYPE_WORDS.test(words[words.length - 1]));

            return hasHouseNumber || hasIntersectionSeparator || hasStreetTypeWord;
        }

        // Returns one of: "intersection", "address", "bare_street",
        // "poi", "postal_fsa" (3-char, e.g. "H9B"), "postal_full" (6-char)
        function classifyAddress(address) {
            const trimmed = address.trim();

            if (CA_POSTAL_FULL.test(trimmed)) return "postal_full";
            if (CA_POSTAL_FSA.test(trimmed)) return "postal_fsa";

            const hasHouseNumber = /^\d+/.test(trimmed);
            const streetNames = splitIntersection(trimmed);

            if (streetNames.length >= 2) return "intersection";
            if (hasHouseNumber) return "address";
            if (looksLikeStreetReference(trimmed)) return "bare_street";
            return "poi";
        }

        function drawCircleFallback(report, color, popupContent) {
            const category = classifyAddress(report.address);

            if (category === "intersection") {
                return L.circle([report.lat, report.lon], { radius: 150, fillColor: color, color: color, weight: 3, fillOpacity: 0.45 }).addTo(map).bindPopup(popupContent);
            } else if (category === "bare_street" || category === "poi" || category === "postal_fsa") {
                // Bare street name (no house number), a standalone
                // place/landmark, or a 3-char postal sector - all are
                // ambiguous about exactly where the flooding is within
                // a wide area, so a circle is more honest than a line.
                return L.circle([report.lat, report.lon], { radius: 200, fillColor: color, color: color, weight: 2, fillOpacity: 0.4 }).addTo(map).bindPopup(popupContent);
            } else {
                // "address" or "postal_full" - a specific point
                return L.circle([report.lat, report.lon], { radius: 40, fillColor: color, color: color, weight: 2, fillOpacity: 0.6 }).addTo(map).bindPopup(popupContent);
            }
        }

        // =========================================================
        // GEOMETRY MATH (Haversine distance + line trimming)
        // =========================================================
        function haversineMeters(p1, p2) {
            const R = 6371000;
            const toRad = deg => deg * Math.PI / 180;
            const dLat = toRad(p2.lat - p1.lat);
            const dLon = toRad(p2.lon - p1.lon);
            const lat1 = toRad(p1.lat);
            const lat2 = toRad(p2.lat);
            const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function findClosestPointOnLine(line, target) {
            let bestIdx = 0, bestDist = Infinity;
            for (let i = 0; i < line.length; i++) {
                const d = haversineMeters(line[i], target);
                if (d < bestDist) { bestDist = d; bestIdx = i; }
            }
            return { index: bestIdx, distance: bestDist };
        }

        function walkDistance(line, startIndex, direction, maxMeters) {
            const result = [line[startIndex]];
            let accumulated = 0, i = startIndex;
            while (true) {
                const nextI = i + direction;
                if (nextI < 0 || nextI >= line.length) break;
                const segmentDist = haversineMeters(line[i], line[nextI]);
                if (accumulated + segmentDist >= maxMeters) {
                    const fraction = (maxMeters - accumulated) / segmentDist;
                    result.push({
                        lat: line[i].lat + (line[nextI].lat - line[i].lat) * fraction,
                        lon: line[i].lon + (line[nextI].lon - line[i].lon) * fraction
                    });
                    break;
                } else {
                    result.push(line[nextI]);
                    accumulated += segmentDist;
                    i = nextI;
                }
            }
            return result;
        }

        function trimRoadAroundPoint(line, target, maxMeters) {
            const { index } = findClosestPointOnLine(line, target);
            const backward = walkDistance(line, index, -1, maxMeters).reverse();
            const forward = walkDistance(line, index, +1, maxMeters);
            return backward.concat(forward.slice(1));
        }

        // =========================================================
        // ROAD STITCHING
        // OSM frequently splits a single real-world street into many
        // separate "way" objects (e.g. one per block, or split at
        // every intersection - this is standard, recommended OSM
        // practice, not a data error). If we only trim within
        // whichever single way is closest to our point, the highlight
        // gets artificially clipped wherever the road happens to be
        // segmented near that point - which is extremely common right
        // at intersections. Fixing this requires stitching all
        // same-named, connected ways into one continuous line first.
        // =========================================================
        function pointsMatch(p1, p2) {
            return haversineMeters(p1, p2) <= ENDPOINT_TOLERANCE_METERS;
        }

        // Given a list of geometry arrays (already filtered to ones
        // matching our target street name), stitch together any that
        // connect end-to-end. Returns an array of stitched lines
        // (more than one if there are disconnected clusters).
        function stitchRoadGeometries(geometries) {
            if (geometries.length === 0) return [];
            if (geometries.length === 1) return [geometries[0]];

            let remaining = geometries.map(g => g.slice());
            const stitched = [];

            while (remaining.length > 0) {
                let current = remaining.shift();
                let mergedSomething = true;

                while (mergedSomething) {
                    mergedSomething = false;
                    for (let i = 0; i < remaining.length; i++) {
                        const candidate = remaining[i];
                        const curStart = current[0], curEnd = current[current.length - 1];
                        const candStart = candidate[0], candEnd = candidate[candidate.length - 1];

                        if (pointsMatch(curEnd, candStart)) {
                            current = current.concat(candidate.slice(1));
                        } else if (pointsMatch(curEnd, candEnd)) {
                            current = current.concat(candidate.slice().reverse().slice(1));
                        } else if (pointsMatch(curStart, candEnd)) {
                            current = candidate.concat(current.slice(1));
                        } else if (pointsMatch(curStart, candStart)) {
                            current = candidate.slice().reverse().concat(current.slice(1));
                        } else {
                            continue;
                        }
                        remaining.splice(i, 1);
                        mergedSomething = true;
                        break;
                    }
                }
                stitched.push(current);
            }
            return stitched;
        }

        // =========================================================
        // STREET NAME MATCHING
        // =========================================================
        function normalizeStreetName(name) {
            if (!name) return "";
            let n = name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            const replacements = [
                [/\bboulevard\b/g, "blvd"], [/\bavenue\b/g, "ave"], [/\bstreet\b/g, "st"],
                [/\bsaint\b/g, "st"], [/-/g, " "], [/[\/]/g, " "],
                [/[^a-z0-9 ]/g, ""], [/\s+/g, " "]
            ];
            for (const [p, r] of replacements) n = n.replace(p, r);
            return n.trim();
        }

        function levenshteinDistance(a, b) {
            const m = a.length, n = b.length;
            if (m === 0) return n;
            if (n === 0) return m;
            const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
            for (let i = 0; i <= m; i++) dp[i][0] = i;
            for (let j = 0; j <= n; j++) dp[0][j] = j;
            for (let i = 1; i <= m; i++) {
                for (let j = 1; j <= n; j++) {
                    dp[i][j] = a[i - 1] === b[j - 1]
                        ? dp[i - 1][j - 1]
                        : 1 + Math.min(dp[i - 1][j - 1], dp[i - 1][j], dp[i][j - 1]);
                }
            }
            return dp[m][n];
        }

        function streetNamesMatch(formName, osmName) {
            const a = normalizeStreetName(formName), b = normalizeStreetName(osmName);
            if (!a || !b) return false;
            if (a.includes(b) || b.includes(a)) return true;

            // Tolerate small typos (e.g. "Lavigned" vs "Lavigne") by
            // checking each word in the OSM name against each word in
            // the form name, allowing a small edit-distance for longer
            // words. This catches one-character typos without being
            // loose enough to match genuinely different street names.
            const aWords = a.split(' ').filter(w => w.length >= 4);
            const bWords = b.split(' ').filter(w => w.length >= 4);
            for (const aw of aWords) {
                for (const bw of bWords) {
                    const maxLen = Math.max(aw.length, bw.length);
                    const allowedDistance = maxLen >= 7 ? 2 : 1;
                    if (levenshteinDistance(aw, bw) <= allowedDistance) return true;
                }
            }
            return false;
        }

        // =========================================================
        // OVERPASS FETCHING (runs from the visitor's browser, not
        // from Google's servers, to avoid the current cloud-IP block)
        // =========================================================

        // Maps the Google Form's "Where is/was the flood" dropdown
        // values to the OSM administrative area name to query. Uses
        // the form's own values almost as-is - only "Pointe-claire"
        // needed a casing fix. If a city's real OSM boundary name
        // ever differs from what's listed here, the safety net
        // (falling back to a circle when the boundary query returns
        // nothing) keeps the map working either way.
        const CITY_TO_OSM_AREA_NAME = {
            "beaconsfield": "Beaconsfield",
            "dollard-des-ormeaux": "Dollard-Des Ormeaux",
            "kirkland": "Kirkland",
            "pierrefonds-roxboro": "Pierrefonds-Roxboro",
            "pointe-claire": "Pointe-Claire",
            "dorval": "Dorval",
        };

        function resolveOsmAreaName(cityFromSheet) {
            if (!cityFromSheet) return null;
            return CITY_TO_OSM_AREA_NAME[cityFromSheet.trim().toLowerCase()] || null;
        }

        async function fetchNearbyRoads(lat, lon, radiusMeters) {
            const query = `[out:json][timeout:20];way["highway"](around:${radiusMeters},${lat},${lon});out geom;`;
            return fetchFromOverpass(query);
        }

        // Fetches ALL road segments matching streetName anywhere
        // within the named city's administrative boundary - used for
        // "bare street" reports where we want to highlight the whole
        // street's run through that city, not just a point.
        async function fetchRoadsInCity(osmAreaName, streetName) {
            const escapedName = streetName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const query = `[out:json][timeout:25];area["name"="${osmAreaName}"]["boundary"="administrative"]->.searchArea;way["highway"]["name"~"${escapedName}",i](area.searchArea);out geom;`;
            return fetchFromOverpass(query);
        }

        async function fetchFromOverpass(query) {
            for (const endpoint of OVERPASS_ENDPOINTS) {
                const directUrl = endpoint + '?data=' + encodeURIComponent(query);
                const proxiedUrl = CORS_PROXY_PREFIX + encodeURIComponent(directUrl);
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), OVERPASS_FETCH_TIMEOUT_MS);
                    const res = await fetch(proxiedUrl, { signal: controller.signal, headers: { "Accept": "application/json" } });
                    clearTimeout(timeoutId);

                    if (!res.ok) continue; // try next endpoint

                    const data = await res.json();
                    if (!data.elements || data.elements.length === 0) return null;

                    return data.elements
                        .filter(el => el.type === "way" && el.geometry && el.geometry.length >= 2)
                        .map(el => ({
                            name: el.tags?.name || "",
                            geometry: el.geometry.map(pt => ({ lat: pt.lat, lon: pt.lon }))
                        }));
                } catch (err) {
                    continue; // try next endpoint (timeout, network error, etc.)
                }
            }
            return null; // all endpoints failed
        }

        // Finds all roads matching candidateName, stitches any that
        // connect end-to-end into continuous lines, then returns
        // whichever stitched line passes closest to target.
        function findBestMatchingStitchedRoad(roads, candidateName, target) {
            const matchingGeometries = roads
                .filter(r => r.name && streetNamesMatch(candidateName, r.name))
                .map(r => r.geometry);
            if (matchingGeometries.length === 0) return null;

            const stitchedLines = stitchRoadGeometries(matchingGeometries);

            let best = null, bestDist = Infinity;
            for (const line of stitchedLines) {
                const closest = findClosestPointOnLine(line, target);
                if (closest.distance < bestDist) { bestDist = closest.distance; best = line; }
            }
            return best;
        }

        // Fallback when no name match is found at all: just take the
        // single closest road of ANY name, with a sanity distance cap.
        function findClosestRoadOverall(roads, target) {
            let best = null, bestDist = Infinity;
            for (const road of roads) {
                const closest = findClosestPointOnLine(road.geometry, target);
                if (closest.distance < bestDist) { bestDist = closest.distance; best = road.geometry; }
            }
            return (bestDist <= 120) ? best : null;
        }

        // For a "whole street within this city" report: stitch EVERY
        // matching road segment into however many continuous lines
        // result (a long street can still end up as several disjoint
        // pieces if it's interrupted - that's fine, we draw all of
        // them). There's no single "closest point" to filter by here.
        function stitchAllMatchingRoads(roads, streetName) {
            const matchingGeometries = roads
                .filter(r => r.name && streetNamesMatch(streetName, r.name))
                .map(r => r.geometry);
            if (matchingGeometries.length === 0) return null;
            const stitched = stitchRoadGeometries(matchingGeometries);
            return stitched.length > 0 ? stitched : null;
        }

        async function buildLineGeometryForReport(report) {
            const category = classifyAddress(report.address);

            // POIs/landmarks and 3-char postal sectors stay circles -
            // skip Overpass entirely (saves a network request). A
            // 6-char postal code alone has no street name to match
            // against, so it also can't become a line.
            if (category === "poi" || category === "postal_fsa" || category === "postal_full") return null;

            const target = { lat: report.lat, lon: report.lon };

            if (category === "intersection") {
                const streetNames = splitIntersection(report.address);
                const nearbyRoads = await fetchNearbyRoads(report.lat, report.lon, INTERSECTION_TRIM_METERS + SEARCH_MARGIN_METERS);
                if (!nearbyRoads || nearbyRoads.length === 0) return null;

                const segments = [];
                for (const name of streetNames) {
                    const stitchedLine = findBestMatchingStitchedRoad(nearbyRoads, name, target);
                    if (stitchedLine) {
                        const trimmed = trimRoadAroundPoint(stitchedLine, target, INTERSECTION_TRIM_METERS);
                        if (trimmed.length >= 2) segments.push(trimmed);
                    }
                }
                return segments.length > 0 ? segments : null;

            } else if (category === "address") {
                const nearbyRoads = await fetchNearbyRoads(report.lat, report.lon, ADDRESS_TRIM_METERS + SEARCH_MARGIN_METERS);
                if (!nearbyRoads || nearbyRoads.length === 0) return null;

                let stitchedLine = findBestMatchingStitchedRoad(nearbyRoads, report.address, target);
                if (!stitchedLine) stitchedLine = findClosestRoadOverall(nearbyRoads, target);
                if (!stitchedLine) return null;

                const trimmed = trimRoadAroundPoint(stitchedLine, target, ADDRESS_TRIM_METERS);
                return trimmed.length >= 2 ? [trimmed] : null;

            } else if (category === "bare_street") {
                // Highlight the FULL run of this street within the
                // reported city's boundary, not just a point around it.
                // Requires the city column from the sheet - if it's
                // missing or doesn't map to a known OSM area, fall
                // back to the circle (handled by returning null).
                const osmAreaName = resolveOsmAreaName(report.city);
                if (!osmAreaName) return null;

                const cityRoads = await fetchRoadsInCity(osmAreaName, report.address);
                if (!cityRoads || cityRoads.length === 0) return null;

                const stitchedLines = stitchAllMatchingRoads(cityRoads, report.address);
                return stitchedLines; // already null-safe; array of segments or null
            }

            return null;
        }

        // =========================================================
        // MAIN LOAD
        // =========================================================
        if (DATA_FEED_URL) {
            fetch(DATA_FEED_URL)
                .then(res => res.json())
                .then((reports) => {
                    // STEP 1: Draw every circle immediately, synchronously.
                    // The map is fully populated the instant data arrives -
                    // nothing waits on Overpass for this.
                    const layers = reports.map(report => {
                        const color = getMarkerColor(report.severity);
                        const popupContent = buildPopup(report);
                        const circleLayer = drawCircleFallback(report, color, popupContent);
                        return { report, color, popupContent, circleLayer };
                    });

                    // STEP 2: Kick off ALL Overpass lookups in parallel.
                    // Each one independently swaps its own circle for a
                    // line if/when it succeeds. A slow or failing row
                    // never blocks any other row.
                    layers.forEach(({ report, color, popupContent, circleLayer }) => {
                        buildLineGeometryForReport(report)
                            .then(lineSegments => {
                                if (lineSegments && lineSegments.length > 0) {
                                    map.removeLayer(circleLayer);
                                    lineSegments.forEach(segment => {
                                        const latLngs = segment.map(pt => [pt.lat, pt.lon]);
                                        L.polyline(latLngs, { color: color, weight: 6, opacity: 0.75, lineCap: 'round' })
                                            .addTo(map).bindPopup(popupContent);
                                    });
                                }
                                // else: keep the circle that's already showing - no action needed
                            })
                            .catch(err => {
                                console.warn("Line geometry failed for", report.address, "- keeping circle.", err);
                                // circle is already shown, nothing more to do
                            });
                    });
                }).catch(err => console.error("Data pipeline load error:", err));
        }

        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<strong style="display:block; margin-bottom: 6px;">Status / Statut</strong>';
            div.innerHTML += '<div><i style="background: #d9534f"></i> Severe / Majeure</div>';
            div.innerHTML += '<div><i style="background: #f0ad4e"></i> Mild / Modérée</div>';
            div.innerHTML += '<div><i style="background: #5cb85c"></i> Low / No Flood / Faible</div>';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
