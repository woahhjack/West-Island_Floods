<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>West Island June 20 Flood Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        #map { height: 100vh; width: 100vw; }
        .legend {
            background: white; padding: 10px; line-height: 18px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2); border-radius: 5px;
        }
        .legend i { width: 18px; height: 18px; float: left; margin-right: 8px; opacity: 0.7; border-radius: 50%; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. REPLACE THIS URL with your copied Google Web App URL
        const DATA_FEED_URL = "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE";

        // Initialize map centered roughly over the West Island (DDO / Pointe-Claire area)
        const map = L.map('map').setView([45.4764, -73.8417], 12);

        // Add clean OpenStreetMap map tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Helper for marker colors
        function getMarkerColor(severity) {
            const sev = severity.toLowerCase().trim();
            if (sev.includes('severe')) return 'red';
            if (sev.includes('mild')) return 'orange';
            return 'green';
        }

        // Fetch approved data from your Google Sheet script
        fetch(DATA_FEED_URL)
            .then(res => res.json())
            .then(reports => {
                reports.forEach(report => {
                    // Pull fields based on your exact Form headers (lowercase, no spaces)
                    const address = report.addressornearestintersection; 
                    const nickname = report.nickname || "Anonymous";
                    const severity = report.floodseverity || "No Flood";

                    if (!address) return;

                    // Geocode the address safely on the client side for free
                    const searchUrl = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}+West+Island+Montreal`;
                    
                    // Add a tiny delay to respect open-source rate limits during batch loads
                    setTimeout(() => {
                        fetch(searchUrl)
                            .then(r => r.json())
                            .then(geoResults => {
                                if (geoResults && geoResults.length > 0) {
                                    const loc = geoResults[0];
                                    const color = getMarkerColor(severity);

                                    // Create a colored circle marker
                                    const marker = L.circleMarker([loc.lat, loc.lon], {
                                        radius: 10,
                                        fillColor: color,
                                        color: '#fff',
                                        weight: 2,
                                        opacity: 1,
                                        fillOpacity: 0.8
                                    }).addTo(map);

                                    marker.bindPopup(`
                                        <strong>Reported by:</strong> ${nickname}<br>
                                        <strong>Location:</strong> ${address}<br>
                                        <strong>Status:</strong> ${severity}
                                    `);
                                }
                            }).catch(err => console.error("Geocoding error:", err));
                    }, 200); 
                });
            });

        // Add a visual Legend to the map
        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<strong>Flood Status</strong><br>';
            div.innerHTML += '<i style="background: red"></i> Severe Flood<br>';
            div.innerHTML += '<i style="background: orange"></i> Mild Flood<br>';
            div.innerHTML += '<i style="background: green"></i> No Flood<br>';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
