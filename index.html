<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>West Island June 20 Flood Map / Carte des Inondations</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        .legend {
            background: white; padding: 12px; line-height: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); border-radius: 8px; font-size: 13px;
        }
        .legend i { width: 14px; height: 14px; float: left; margin-right: 8px; opacity: 0.8; border-radius: 50%; margin-top: 3px; }
        .report-btn {
            position: absolute; top: 20px; left: 60px; z-index: 1000; 
            background: white; padding: 12px 18px; border-radius: 8px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.2); font-weight: bold; 
            text-decoration: none; color: #d9534f; border: 2px solid #d9534f;
            font-size: 14px; text-align: center; line-height: 1.4;
            transition: all 0.2s ease;
        }
        .report-btn:hover { background: #d9534f; color: white; }
    </style>
</head>
<body>

    <!-- Bilingual Floating Action Button linked to your Google Form -->
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSeknXL4-K45ajNzb32mYb4nKLntBXpRv5abzQeLVaq258Mafg/viewform?usp=header" target="_blank" class="report-btn">
        ⚠️ Report Flooding (Street or Home)<br><span style="font-size: 11px; font-weight: normal; display:block; margin-top:2px;">Signaler une inondation (rue ou maison)</span>
    </a>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Your live Google Apps Script Data Feed Link
        const DATA_FEED_URL = "https://script.google.com/macros/s/AKfycbxNfHFi5zd41IgTSy04JgUznhCbvtQVn9tHcH7ryLubzhFlfNfbUf0_-aujaqOkxhKgxw/exec";

        // Center map coordinates on the West Island area
        const map = L.map('map').setView([45.4764, -73.8417], 12);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        function getMarkerColor(severity) {
            if (!severity) return '#5cb85c';
            const sev = severity.toLowerCase().trim();
            if (sev.includes('severe') || sev.includes('majeur')) return '#d9534f'; 
            if (sev.includes('mild') || sev.includes('modér') || sev.includes('medium') || sev.includes('moyen')) return '#f0ad4e'; 
            return '#5cb85c'; 
        }

        // Distance utility to locate the closest coordinate point along a street array
        function findClosestCoordinateIndex(coords, targetLat, targetLon) {
            let minDistance = Infinity;
            let closestIndex = 0;
            for (let i = 0; i < coords.length; i++) {
                let distance = Math.pow(coords[i][1] - targetLat, 2) + Math.pow(coords[i][0] - targetLon, 2);
                if (distance < minDistance) {
                    minDistance = distance;
                    closestIndex = i;
                }
            }
            return closestIndex;
        }

        if (DATA_FEED_URL) {
            fetch(DATA_FEED_URL)
                .then(res => res.json())
                .then(reports => {
                    reports.forEach((report, index) => {
                        const addressText = report.address; 
                        const nickname = report.nickname || "Neighbor / Voisin";
                        const severity = report.severity || "Low / Faible";

                        if (!addressText) return;

                        const color = getMarkerColor(severity);
                        const popupContent = `
                            <div style="font-family: sans-serif; font-size: 13px; line-height: 18px;">
                                <strong style="font-size: 14px; color: #333;">${severity}</strong><br>
                                <hr style="border: 0; border-top: 1px solid #eee; margin: 6px 0;">
                                <strong>User / Info:</strong> ${nickname}<br>
                                <strong>Location / Emplacement:</strong> ${addressText}
                            </div>
                        `;

                        // RegEx scans to check if the submission begins with a numeric street address marker
                        const hasHouseNumber = /^\d+/.test(addressText.trim());

                        setTimeout(() => {
                            if (hasHouseNumber) {
                                // TRACK 3: SPECIFIC ADDRESS (Localized Street Segment Slicing)
                                const exactUrl = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addressText)},+Quebec,+Canada`;
                                
                                fetch(exactUrl)
                                    .then(r => r.json())
                                    .then(exactResults => {
                                        if (exactResults && exactResults.length > 0) {
                                            const exactLat = parseFloat(exactResults[0].lat);
                                            const exactLon = parseFloat(exactResults[0].lon);
                                            const baseStreet = addressText.replace(/^\d+[-/\d]*\s+/, '');

                                            // Sub-fetch the underlying street line string geometry
                                            const streetUrl = `https://nominatim.openstreetmap.org/search?format=json&polygon_geojson=1&q=${encodeURIComponent(baseStreet)},+Quebec,+Canada`;
                                            
                                            fetch(streetUrl)
                                                .then(r2 => r2.json())
                                                .then(streetResults => {
                                                    const match = streetResults.find(res => res.geojson && (res.geojson.type === "LineString" || res.geojson.type === "MultiLineString"));
                                                    if (match && match.geojson.type === "LineString") {
                                                        const coords = match.geojson.coordinates;
                                                        const closestIdx = findClosestCoordinateIndex(coords, exactLat, exactLon);
                                                        
                                                        // Slice array to isolate the immediate neighborhood layout (+/- 3 vector nodes)
                                                        const start = Math.max(0, closestIdx - 3);
                                                        const end = Math.min(coords.length, closestIdx + 4);
                                                        match.geojson.coordinates = coords.slice(start, end);

                                                        L.geoJSON(match.geojson, {
                                                            style: { color: color, weight: 9, opacity: 0.7, lineCap: 'round' }
                                                        }).addTo(map).bindPopup(popupContent);
                                                    } else {
                                                        // Point backup fallback if vector calculation fails
                                                        L.circleMarker([exactLat, exactLon], { radius: 12, fillColor: color, color: '#fff', weight: 2, opacity: 1, fillOpacity: 0.8 }).addTo(map).bindPopup(popupContent);
                                                    }
                                                });
                                        }
                                    }).catch(err => console.error("Address track processing error:", err));

                            } else {
                                // TRACK 1 & 2: WHOLE STREET OR LANDMARK POI
                                const searchUrl = `https://nominatim.openstreetmap.org/search?format=json&polygon_geojson=1&q=${encodeURIComponent(addressText)},+Quebec,+Canada`;
                                
                                fetch(searchUrl)
                                    .then(r => r.json())
                                    .then(geoResults => {
                                        if (geoResults && geoResults.length > 0) {
                                            const loc = geoResults[0];

                                            if (loc.geojson && (loc.geojson.type === "LineString" || loc.geojson.type === "MultiLineString")) {
                                                // Renders the entire street line because no house number was specified
                                                L.geoJSON(loc.geojson, {
                                                    style: { color: color, weight: 8, opacity: 0.65, lineCap: 'round' }
                                                }).addTo(map).bindPopup(popupContent);
                                            } else {
                                                // Renders standalone circular bubble for landmarks/POIs (e.g., schools, parks)
                                                L.circleMarker([loc.lat, loc.lon], { radius: 12, fillColor: color, color: '#fff', weight: 2, opacity: 1, fillOpacity: 0.8 }).addTo(map).bindPopup(popupContent);
                                            }
                                        }
                                    }).catch(err => console.error("Standard track processing error:", err));
                            }
                        }, index * 2500); // 2.5 second intervals protects geocoding server performance
                    });
                }).catch(err => console.error("Data feed loading error:", err));
        }

        // Map Legend setup
        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<strong style="display:block; margin-bottom: 6px;">Status / Statut</strong>';
            div.innerHTML += '<div><i style="background: #d9534f"></i> Severe / Majeure</div>';
            div.innerHTML += '<div><i style="background: #f0ad4e"></i> Mild / Modérée</div>';
            div.innerHTML += '<div><i style="background: #5cb85c"></i> Low / No Flood / Faible</div>';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
