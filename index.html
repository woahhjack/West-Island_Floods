<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>West Island June 20 Flood Map / Carte des Inondations</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        .legend {
            background: white; padding: 12px; line-height: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); border-radius: 8px; font-size: 13px;
        }
        .legend i { width: 14px; height: 14px; float: left; margin-right: 8px; opacity: 0.8; border-radius: 50%; margin-top: 3px; }
        .report-btn {
            position: absolute; top: 20px; left: 60px; z-index: 1000; 
            background: white; padding: 12px 18px; border-radius: 8px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.2); font-weight: bold; 
            text-decoration: none; color: #d9534f; border: 2px solid #d9534f;
            font-size: 14px; text-align: center; line-height: 1.4;
            transition: all 0.2s ease;
        }
        .report-btn:hover { background: #d9534f; color: white; }
    </style>
</head>
<body>

    <a href="https://docs.google.com/forms/d/e/1FAIpQLSeknXL4-K45ajNzb32mYb4nKLntBXpRv5abzQeLVaq258Mafg/viewform?usp=header" target="_blank" class="report-btn">
        ⚠️ Report Flooding (Street or Home)<br><span style="font-size: 11px; font-weight: normal; display:block; margin-top:2px;">Signaler une inondation (rue ou maison)</span>
    </a>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const DATA_FEED_URL = "https://script.google.com/macros/s/AKfycbxNfHFi5zd41IgTSy04JgUznhCbvtQVn9tHcH7ryLubzhFlfNfbUf0_-aujaqOkxhKgxw/exec";

        // Initialized zoom at 12.5 (1.5x closer scale)
        const map = L.map('map').setView([45.4764, -73.8417], 12.5);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        function getMarkerColor(severity) {
            if (!severity) return '#5cb85c';
            const sev = severity.toLowerCase().trim();
            if (sev.includes('severe') || sev.includes('majeur')) return '#d9534f'; 
            if (sev.includes('mild') || sev.includes('modér') || sev.includes('medium') || sev.includes('moyen')) return '#f0ad4e'; 
            return '#5cb85c'; 
        }

        if (DATA_FEED_URL) {
            fetch(DATA_FEED_URL)
                .then(res => res.json())
                .then(reports => {
                    reports.forEach(report => {
                        const color = getMarkerColor(report.severity);
                        const popupContent = `
                            <div style="font-family: sans-serif; font-size: 13px; line-height: 18px;">
                                <strong style="font-size: 14px; color: #333;">${report.severity}</strong><br>
                                <hr style="border: 0; border-top: 1px solid #eee; margin: 6px 0;">
                                <strong>User / Info:</strong> ${report.nickname}<br>
                                <strong>Location / Emplacement:</strong> ${report.address}
                            </div>
                        `;

                        // Check if item is a text-described intersection or a school/POI landmark
                        const isIntersection = /[\/&]|\band\b/i.test(report.address) && !/school|high|park|centre/i.test(report.address);
                        const hasHouseNumber = /^\d+/.test(report.address.trim());

                        if (isIntersection) {
                            // Perfect 150m crosshair coverage circle centered right over the intersection point
                            L.circle([report.lat, report.lon], { radius: 150, fillColor: color, color: color, weight: 3, fillOpacity: 0.45 }).addTo(map).bindPopup(popupContent);
                        } else if (!hasHouseNumber) {
                            // Landmark/School Campus View: Big 200m radius circle that grows larger dynamically on close zoom layouts
                            L.circle([report.lat, report.lon], { radius: 200, fillColor: color, color: color, weight: 2, fillOpacity: 0.4 }).addTo(map).bindPopup(popupContent);
                        } else {
                            // Single House Pinpoint Circle
                            L.circle([report.lat, report.lon], { radius: 40, fillColor: color, color: color, weight: 2, fillOpacity: 0.6 }).addTo(map).bindPopup(popupContent);
                        }
                    });
                }).catch(err => console.error("Data pipeline load error:", err));
        }

        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<strong style="display:block; margin-bottom: 6px;">Status / Statut</strong>';
            div.innerHTML += '<div><i style="background: #d9534f"></i> Severe / Majeure</div>';
            div.innerHTML += '<div><i style="background: #f0ad4e"></i> Mild / Modérée</div>';
            div.innerHTML += '<div><i style="background: #5cb85c"></i> Low / No Flood / Faible</div>';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
